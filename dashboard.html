<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — PrimXcapital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">
  <div class="dashboard__layout">
    <aside class="sidebar" id="sidebar">
      <a href="index.html" class="sidebar__logo">
        <img src="logo.jpg" alt="PrimXCapital Logo" class="nav__logo-image">
        <span>Prim<span class="sidebar__logo-accent">X</span>capital</span>
      
      </a>
      <nav class="sidebar__nav">
        <a href="dashboard.html" class="sidebar__link sidebar__link--active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <span data-i18n="nav_dash">Dashboard</span>
        </a>
        <a href="deposit.html" class="sidebar__link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span data-i18n="nav_deposit">Deposit</span>
        </a>
        <a href="withdraw.html" class="sidebar__link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span data-i18n="nav_withdraw">Withdraw</span>
        </a>
        <a href="settings.html" class="sidebar__link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span data-i18n="nav_settings">Settings</span>
        </a>
        <a href="https://t.me/nicole_tremblay" class="sidebar__link">
  <span>Telegram Support</span>
</a>
<a href="#" class="sidebar__link" id="logoutBtn">
  <span>Logout</span>
</a>
      </nav>
    </aside>

    <div class="dashboard__main">
      <header class="dashboard__header">
        <button class="dashboard__menu-btn" id="menuBtn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="dashboard__user-profile">
          <div id="userAvatar" class="dashboard__user-avatar"></div>
          <div class="dashboard__user-details">
            <div id="userName" class="dashboard__user-name">loading...</div>
            <div id="userEmail" class="dashboard__user-email">loading...</div>
          </div>
        </div>
      </header>

      <main class="dashboard__content">
        <div class="dashboard__stats" style="grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;">
          <div class="dash-card">
            <div class="dash-card__header"><span class="dash-card__label" data-i18n="dash_balance">Account Balance</span></div>
            <h2 class="dash-card__value" id="accountBalance">$0.00</h2>
          </div>
          <div class="dash-card">
            <div class="dash-card__header"><span class="dash-card__label">Total Deposits</span></div>
            <h2 class="dash-card__value" id="totalDeposit">$0.00</h2>
          </div>
          <div class="dash-card">
            <div class="dash-card__header"><span class="dash-card__label">Selected Tier Plan</span></div>
            <h2 class="dash-card__value" id="tierPlan">Loading...</h2>
          </div>
          <div class="dash-card">
            <div class="dash-card__header"><span class="dash-card__label">Total Withdrawals</span></div>
            <h2 class="dash-card__value" id="totalWithdrawals">$0.00</h2>
          </div>
            <div class="dash-card">
  <div class="dash-card__header">
    <span class="dash-card__label">Interest Wallet</span>
  </div>
  <h2 class="dash-card__value" id="interestWallet">$0.00</h2>
         </div>
        </div>

        <div class="dashboard__history-section" style="margin-top: 32px;">
          <div class="dash-card">
            <h3 class="dash-card__title" data-i18n="dash_history_title">Recent Ledger Movements</h3>
            <div class="table-wrapper">
              <table class="dash-table">
                <thead>
                  <tr>
                    <th data-i18n="dash_th_type">Type</th>
                    <th data-i18n="dash_th_amount">Amount</th>
                    <th data-i18n="dash_th_method">Method</th>
                    <th data-i18n="dash_th_status">Status</th>
                    <th data-i18n="dash_th_date">Date</th>
                  </tr>
                </thead>
                <tbody id="transactionsBody">
                  <tr><td colspan="5" style="text-align:center;">Fetching records...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js" defer></script>
</body>
</html>
