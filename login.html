
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — PrimXcapital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://js.hcaptcha.com/1/api.js" defer></script>
</head>
<body class="auth-page">
  <div class="auth__bg"></div>
  <div class="auth__particles" id="particles"></div>
  <div class="auth__container">
    <a href="index.html" class="auth__logo">
      <img src="logo.jpg" alt="PrimXCapital Logo" class="nav__logo-image">
      <span>Prim<span class="auth__logo-accent">X</span>capital</span>
    </a>
    <div class="auth__card fade-in visible">
      <h1 class="auth__title" data-i18n="login_title">Welcome Back</h1>
      <p class="auth__subtitle" data-i18n="login_subtitle">Sign in to your PrimXcapital account</p>
      <form class="auth__form" id="loginForm">
        <div class="auth__field">
          <label for="loginEmail" data-i18n="login_email">Email Address</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="auth__field">
          <label for="loginPassword" data-i18n="login_password">Password</label>
          <div class="auth__password-wrapper">
            <input type="password" id="loginPassword" placeholder="••••••••" required>
            <button type="button" class="auth__toggle-password" id="togglePassword">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="auth__options">
          <label class="auth__checkbox">
            <input type="checkbox" id="rememberMe">
            <span data-i18n="login_remember">Remember me</span>
          </label>
          <a href="#" class="auth__forgot" data-i18n="login_forgot">Forgot password?</a>
        </div>
        <div class="h-captcha" data-sitekey="77d816a4-3e1a-4c2a-b216-aa56e58aa522"></div>
          <button type="submit" class="btn btn--primary btn--full btn--lg" id="loginBtn" data-i18n="login_button">Sign In</button>
      </form>
      <p class="auth__footer">
        <span data-i18n="login_no_account">Don't have an account?</span>
        <a href="register.html" data-i18n="login_register">Create one</a>
      </p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
