<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — PrimXcapital</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="auth__bg"></div>
  <div class="auth__container">
    <a href="index.html" class="auth__logo">
     <img src="logo.jpg" alt="PrimXCapital Logo" class="nav__logo-image">
      <span>Prim<span class="auth__logo-accent">X</span>capital</span>
    </a>
    
    <div class="auth__card fade-in visible">
      <h1 class="auth__title">Create Account</h1>
      <p class="auth__subtitle">Start your investment journey today</p>
      
      <form class="auth__form" id="registerForm">
        
        <div class="auth__field">
          <label for="regEmail">Email Address</label>
          <input type="email" id="regEmail" placeholder="you@example.com" required>
        </div>

        <div class="auth__field">
          <label for="regPassword">Password</label>
          <div class="auth__password-wrapper">
            <input type="password" id="regPassword" placeholder="••••••••" required>
            <button type="button" class="auth__toggle-password" data-target="regPassword">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="auth__field">
          <label for="regConfirm">Confirm Password</label>
          <div class="auth__password-wrapper">
            <input type="password" id="regConfirm" placeholder="••••••••" required>
            <button type="button" class="auth__toggle-password" data-target="regConfirm">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn--primary btn--full btn--lg" id="registerBtn">Create Account</button>
      </form>
      
      <p class="auth__footer">
        <span>Already have an account?</span>
        <a href="login.html">Sign in</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
  <script src="script.js"></script>
</body>
</html>
